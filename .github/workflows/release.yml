name: "🚀 Publish Release"

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to publish (main, commit SHA, or release tag target)"
        required: true
        default: "main"
        type: string

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: "🔨 Build (${{ matrix.target }})"
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
          - target: aarch64-pc-windows-msvc
            runner: windows-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          persist-credentials: false

      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: "🏷️ Read version"
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "🦀 Install Rust target"
        run: rustup target add ${{ matrix.target }}

      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: "📦 Install cross (Linux ARM)"
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: "⚙️ Build"
        run: |
          ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: "✂️ Strip binary"
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/wind-media-cli

      - name: "📦 Package (tar.gz)"
        if: runner.os != 'Windows'
        run: tar czf wind-media-cli-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release wind-media-cli

      - name: "📦 Package (zip)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/wind-media-cli.exe" -DestinationPath "wind-media-cli-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip"

      - name: "📤 Upload artifact"
        uses: actions/upload-artifact@v7
        with:
          name: wind-media-cli-${{ matrix.target }}
          path: wind-media-cli-${{ steps.version.outputs.version }}-${{ matrix.target }}.*
          retention-days: 1

  release:
    name: "🚀 Create GitHub Release"
    runs-on: ubuntu-latest
    needs: [build]
    environment: release
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: "📦 Install cocogitto"
        run: cargo install cocogitto --locked

      - name: "🏷️ Read crate version"
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if [[ "$version" == *-* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "📋 Generate changelog"
        run: cog changelog --at ${{ steps.version.outputs.version }} -t full_hash > GITHUB_CHANGELOG.md

      - name: "📥 Download build artifacts"
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: "🚀 Create GitHub Release"
        uses: softprops/action-gh-release@v2
        with:
          body_path: GITHUB_CHANGELOG.md
          tag_name: ${{ steps.version.outputs.version }}
          target_commitish: ${{ inputs.ref }}
          prerelease: ${{ steps.version.outputs.prerelease == 'true' }}
          files: artifacts/wind-media-cli-*
