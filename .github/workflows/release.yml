name: "🚀 Release"

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release-please:
    name: "📋 Release Please"
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          release-type: rust
          config-file: release-please-config.json

  build:
    name: "🔨 Build (${{ matrix.target }})"
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.release-please.outputs.tag_name }}
          persist-credentials: false

      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false

      - name: "🦀 Install Rust target"
        run: rustup target add ${{ matrix.target }}

      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: "📦 Install cross (Linux ARM)"
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: cargo install cross --locked

      - name: "⚙️ Build"
        run: |
          ${{ matrix.target == 'aarch64-unknown-linux-gnu' && 'cross' || 'cargo' }} build --release --target ${{ matrix.target }}

      - name: "✂️ Strip binary"
        if: runner.os != 'Windows' && matrix.target != 'aarch64-unknown-linux-gnu'
        run: strip target/${{ matrix.target }}/release/wind-media-cli

      - name: "🏷️ Read version"
        id: version
        shell: bash
        run: |
          version="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "([^"]+)"/\1/')"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: "📦 Package (tar.gz)"
        if: runner.os != 'Windows'
        run: tar czf wind-media-cli-${{ steps.version.outputs.version }}-${{ matrix.target }}.tar.gz -C target/${{ matrix.target }}/release wind-media-cli

      - name: "📦 Package (zip)"
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path "target/${{ matrix.target }}/release/wind-media-cli.exe" -DestinationPath "wind-media-cli-${{ steps.version.outputs.version }}-${{ matrix.target }}.zip"

      - name: "📤 Upload artifact"
        uses: actions/upload-artifact@v7
        with:
          name: wind-media-cli-${{ matrix.target }}
          path: wind-media-cli-${{ steps.version.outputs.version }}-${{ matrix.target }}.*
          retention-days: 1

  publish:
    name: "🚀 Publish Release"
    needs: [release-please, build]
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6

      - name: "📥 Download artifacts"
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: "📦 Add artifacts to release"
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/wind-media-cli-*
          tag_name: ${{ needs.release-please.outputs.tag_name }}

      - name: "📤 Publish release"
        run: gh release edit ${{ needs.release-please.outputs.tag_name }} --draft=false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
