name: "🔍 CI"

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: "🎨 Rust Format"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "✅ Check formatting"
        run: cargo fmt --all --check

  clippy:
    name: "🧹 Clippy"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "✅ Lint crate"
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: "🧪 Tests (${{ matrix.os }})"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "✅ Run tests"
        run: cargo test

  docs:
    name: "📖 Docs"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "✅ Build docs"
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --no-deps

  msrv:
    name: "🏛️ MSRV"
    runs-on: ubuntu-latest
    steps:
      - name: "📥 Checkout"
        uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: "🔧 Setup tools"
        uses: jdx/mise-action@v4
        with:
          cache: false
      - name: "💾 Cache Rust artifacts"
        uses: Swatinem/rust-cache@v2
      - name: "✅ Check MSRV"
        run: cargo check
